name: Terraform Snowflake CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

env:
  TF_VAR_snowflake_account:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
  TF_VAR_snowflake_user:        ${{ secrets.SNOWFLAKE_USER }}
  TF_VAR_snowflake_password:    ${{ secrets.SNOWFLAKE_PASSWORD }}
  TF_VAR_organization_name:     ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}

jobs:
  terraform-check:
    name: Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: make init

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: make validate

      - name: Terraform Plan
        run: make plan

  terraform-apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: make init

      - name: Import existing Snowflake resources
        run: |
          terraform import snowflake_database.dwh "DWH" || true
          terraform import snowflake_warehouse.transform_wh "TRANSFORM_WH" || true
          terraform import snowflake_schema.raw "DWH.RAW" || true
          terraform import snowflake_schema.staging "DWH.STAGING" || true
          terraform import snowflake_schema.marts "DWH.MARTS" || true

      - name: Terraform Apply
        run: make apply-auto
