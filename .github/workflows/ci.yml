name: Terraform Snowflake CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

env:
  TF_VAR_snowflake_account:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
  TF_VAR_snowflake_user:        ${{ secrets.SNOWFLAKE_USER }}
  TF_VAR_snowflake_password:    ${{ secrets.SNOWFLAKE_PASSWORD }}
  TF_VAR_organization_name:     ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}

jobs:
  terraform-check:
    name: Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: make init

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: make validate

      - name: Terraform Plan
        run: make plan

  terraform-apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref_name }}
          restore-keys: terraform-state-

      - name: Terraform Init
        run: make init

      - name: Terraform Apply
        run: make apply-auto

      - name: Save Terraform state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref_name }}-${{ github.run_id }}
