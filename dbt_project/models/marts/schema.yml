version: 2

models:

  # ── Dimension tables ────────────────────────────────────────────────────────

  - name: dim_customer
    description: "Customer dimension. One row per customer_id. Holds country — not stored on the fact table."
    meta:
      owner: "data-team"
    columns:
      - name: customer_id
        description: "Unique customer identifier (PK)."
        tests:
          - not_null
          - unique
      - name: country
        description: "Country of the customer."
        tests:
          - not_null

  - name: dim_date
    description: "Date dimension. One row per distinct order date. Carries all derived time attributes."
    meta:
      owner: "data-team"
    columns:
      - name: order_date
        description: "Calendar date (PK)."
        tests:
          - not_null
          - unique
      - name: order_year
        description: "Year (DATE_TRUNC year)."
      - name: order_month
        description: "Month (DATE_TRUNC month)."
      - name: order_quarter
        description: "Quarter (DATE_TRUNC quarter)."
      - name: day_of_week
        description: "Day of week (1=Sunday … 7=Saturday, Snowflake convention)."
      - name: week_of_year
        description: "ISO week number within the year."

  - name: dim_status
    description: "Status dimension. One row per distinct order status. Single source of truth for is_completed."
    meta:
      owner: "data-team"
    columns:
      - name: status
        description: "Order status label (PK)."
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: is_completed
        description: "1 if status is completed, 0 otherwise."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: dim_amount_bucket
    description: "Amount bucket dimension. One row per bucket with min/max thresholds."
    meta:
      owner: "data-team"
    columns:
      - name: amount_bucket
        description: "Bucket label (PK): small / medium / large / premium."
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['small', 'medium', 'large', 'premium']
      - name: min_amount
        description: "Lower threshold of the bucket in euros."
      - name: max_amount
        description: "Upper threshold of the bucket in euros (NULL for premium)."

  # ── Fact table ───────────────────────────────────────────────────────────────

  - name: fact_sales
    description: "{{ doc('fact_sales') }}"
    meta:
      owner: "data-team"
    columns:
      - name: order_id
        description: "Unique order identifier (PK)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK → dim_customer.customer_id"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: order_date
        description: "FK → dim_date.order_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: order_date
      - name: status
        description: "FK → dim_status.status"
        tests:
          - not_null
          - relationships:
              to: ref('dim_status')
              field: status
      - name: amount_bucket
        description: "FK → dim_amount_bucket.amount_bucket"
        tests:
          - not_null
          - relationships:
              to: ref('dim_amount_bucket')
              field: amount_bucket
      - name: amount
        description: "Order amount in euros — the only metric on the fact table."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: status
        description: "Statut de la commande."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: is_completed
        description: "Flag 1 si commande completed, 0 sinon."
        tests:
          - not_null
      - name: country
        description: "Pays du client."
        tests:
          - not_null

  - name: agg_customers
    description: "{{ doc('agg_customers') }}"
    meta:
      owner: "data-team"
    columns:
      - name: customer_id
        description: "Identifiant unique du client (PK)."
        tests:
          - not_null
          - unique
      - name: total_orders
        description: "Nombre total de commandes passées."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: lifetime_value
        description: "Chiffre d'affaires total généré par le client (LTV) en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: avg_order_value
        description: "Panier moyen du client en euros."
        tests:
          - not_null
      - name: first_order_date
        description: "Date de la première commande du client."
        tests:
          - not_null
      - name: last_order_date
        description: "Date de la dernière commande du client."
        tests:
          - not_null
      - name: customer_lifespan_days
        description: "Nombre de jours entre la première et la dernière commande."
      - name: countries_count
        description: "Nombre de pays distincts depuis lesquels le client a commandé."
      - name: completed_orders
        description: "Nombre de commandes avec statut completed."
      - name: non_completed_orders
        description: "Nombre de commandes non complétées."
      - name: days_since_last_order
        description: "Jours écoulés depuis la dernière commande (recency)."
      - name: customer_segment
        description: "Segment client : one-time, occasional, regular, loyal, vip."
        tests:
          - accepted_values:
              values: ['one-time', 'occasional', 'regular', 'loyal', 'vip']
      - name: completion_rate_pct
        description: "Pourcentage de commandes complétées sur le total."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: sales_daily_kpi
    description: "{{ doc('sales_daily_kpi') }}"
    meta:
      owner: "data-team"
    columns:
      - name: order_date
        description: "Date de la journée."
        tests:
          - not_null
      - name: country
        description: "Pays du client."
        tests:
          - not_null
      - name: total_orders
        description: "Nombre de commandes distinctes sur la journée."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: revenue
        description: "Chiffre d'affaires total de la journée en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: avg_order_value
        description: "Panier moyen de la journée."
        tests:
          - not_null
      - name: completed_orders
        description: "Nombre de commandes complétées sur la journée."
      - name: revenue_running_total
        description: "Cumul du revenue depuis le début de l'historique, par pays."
      - name: revenue_prev_day
        description: "Revenue du jour précédent pour le même pays."
      - name: orders_prev_day
        description: "Nombre de commandes du jour précédent pour le même pays."
      - name: country_revenue_rank
        description: "Classement du pays par revenue sur la journée (1 = meilleur)."
      - name: revenue_growth_pct
        description: "Croissance du revenue par rapport au jour précédent en %."
      - name: orders_growth_pct
        description: "Croissance des commandes par rapport au jour précédent en %."
