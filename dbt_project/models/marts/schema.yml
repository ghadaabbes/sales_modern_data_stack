version: 2

models:
  - name: fact_sales
    description: "{{ doc('fact_sales') }}"
    meta:
      owner: "data-team"
    columns:
      - name: order_id
        description: "Identifiant unique de la commande (PK)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Référence au client."
        tests:
          - not_null
      - name: order_date
        description: "Date de la commande."
        tests:
          - not_null
      - name: order_year
        description: "Année de la commande."
      - name: order_month
        description: "Mois de la commande."
      - name: order_quarter
        description: "Trimestre de la commande."
      - name: day_of_week
        description: "Jour de la semaine (convention Snowflake)."
      - name: week_of_year
        description: "Numéro de semaine dans l'année."
      - name: amount
        description: "Montant de la commande en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: amount_bucket
        description: "Segmentation du montant : small, medium, large, premium."
        tests:
          - accepted_values:
              values: ['small', 'medium', 'large', 'premium']
      - name: status
        description: "Statut de la commande."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: is_completed
        description: "Flag 1 si commande completed, 0 sinon."
        tests:
          - not_null
      - name: country
        description: "Pays du client."
        tests:
          - not_null

  - name: agg_customers
    description: "{{ doc('agg_customers') }}"
    meta:
      owner: "data-team"
    columns:
      - name: customer_id
        description: "Identifiant unique du client (PK)."
        tests:
          - not_null
          - unique
      - name: total_orders
        description: "Nombre total de commandes passées."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: lifetime_value
        description: "Chiffre d'affaires total généré par le client (LTV) en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: avg_order_value
        description: "Panier moyen du client en euros."
        tests:
          - not_null
      - name: first_order_date
        description: "Date de la première commande du client."
        tests:
          - not_null
      - name: last_order_date
        description: "Date de la dernière commande du client."
        tests:
          - not_null
      - name: customer_lifespan_days
        description: "Nombre de jours entre la première et la dernière commande."
      - name: countries_count
        description: "Nombre de pays distincts depuis lesquels le client a commandé."
      - name: completed_orders
        description: "Nombre de commandes avec statut completed."
      - name: non_completed_orders
        description: "Nombre de commandes non complétées."
      - name: days_since_last_order
        description: "Jours écoulés depuis la dernière commande (recency)."
      - name: customer_segment
        description: "Segment client : one-time, occasional, regular, loyal, vip."
        tests:
          - accepted_values:
              values: ['one-time', 'occasional', 'regular', 'loyal', 'vip']
      - name: completion_rate_pct
        description: "Pourcentage de commandes complétées sur le total."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: sales_daily_kpi
    description: "{{ doc('sales_daily_kpi') }}"
    meta:
      owner: "data-team"
    columns:
      - name: order_date
        description: "Date de la journée."
        tests:
          - not_null
      - name: country
        description: "Pays du client."
        tests:
          - not_null
      - name: total_orders
        description: "Nombre de commandes distinctes sur la journée."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: revenue
        description: "Chiffre d'affaires total de la journée en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: avg_order_value
        description: "Panier moyen de la journée."
        tests:
          - not_null
      - name: completed_orders
        description: "Nombre de commandes complétées sur la journée."
      - name: revenue_running_total
        description: "Cumul du revenue depuis le début de l'historique, par pays."
      - name: revenue_prev_day
        description: "Revenue du jour précédent pour le même pays."
      - name: orders_prev_day
        description: "Nombre de commandes du jour précédent pour le même pays."
      - name: country_revenue_rank
        description: "Classement du pays par revenue sur la journée (1 = meilleur)."
      - name: revenue_growth_pct
        description: "Croissance du revenue par rapport au jour précédent en %."
      - name: orders_growth_pct
        description: "Croissance des commandes par rapport au jour précédent en %."
