version: 2

models:
  - name: int_orders_enriched
    description: "Commandes enrichies avec dimensions temporelles dérivées et segmentation de montant. Vue intermédiaire entre staging et marts."
    meta:
      owner: "data-team"
    columns:
      - name: order_id
        description: "Identifiant unique de la commande (PK)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identifiant du client."
        tests:
          - not_null
      - name: order_date
        description: "Date de la commande."
        tests:
          - not_null
      - name: amount
        description: "Montant de la commande en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: status
        description: "Statut de la commande."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: country
        description: "Pays du client."
        tests:
          - not_null
      - name: order_year
        description: "Année de la commande (DATE_TRUNC year)."
      - name: order_month
        description: "Mois de la commande (DATE_TRUNC month)."
      - name: order_quarter
        description: "Trimestre de la commande (DATE_TRUNC quarter)."
      - name: day_of_week
        description: "Jour de la semaine (1=Dimanche … 7=Samedi, Snowflake convention)."
      - name: week_of_year
        description: "Numéro de semaine dans l'année."
      - name: amount_bucket
        description: "Segmentation du montant : small (<50), medium (<200), large (<500), premium (>=500)."
        tests:
          - accepted_values:
              values: ['small', 'medium', 'large', 'premium']
      - name: is_completed
        description: "Flag 1 si la commande est completed, 0 sinon."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
