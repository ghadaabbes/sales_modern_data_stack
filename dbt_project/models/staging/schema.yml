version: 2

sources:
  - name: raw
    description: "{{ doc('source_raw') }}"
    database: DWH
    schema: RAW
    # Freshness : alerte si aucune commande récente dans la source brute
    freshness:
      warn_after:  {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: ORDER_DATE
    tables:
      - name: ORDERS
        description: "Table brute des commandes clients chargée depuis le système transactionnel."
        columns:
          - name: ORDER_ID
            description: "Identifiant unique de la commande."
          - name: CUSTOMER_ID
            description: "Identifiant du client."
          - name: ORDER_DATE
            description: "Date à laquelle la commande a été passée."
          - name: AMOUNT
            description: "Montant total de la commande en euros."
          - name: STATUS
            description: "Statut de la commande (completed, pending, cancelled, returned)."
          - name: COUNTRY
            description: "Pays du client."

models:
  - name: stg_orders
    description: "{{ doc('stg_orders') }}"
    meta:
      owner: "data-team"
    columns:
      - name: order_id
        description: "Identifiant unique de la commande (PK)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identifiant du client. Ne peut pas être nul."
        tests:
          - not_null
      - name: order_date
        description: "Date de la commande."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: date
      - name: amount
        description: "Montant de la commande en euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: status
        description: "Statut de la commande."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: country
        description: "Country of the customer."
        tests:
          - not_null

  - name: stg_orders_cdc
    description: >
      CDC table driven by the Snowflake Stream on RAW.ORDERS.
      Uses the custom stream_merge materialization to apply a real MERGE
      instead of a full table rebuild. Tracks every INSERT, UPDATE and DELETE.
      Grain: 1 row per order_id (hard deletes are propagated).
    meta:
      owner: "data-team"
      materialization: stream_merge
      stream: "DWH.RAW.ORDERS_STREAM"
    columns:
      - name: order_id
        description: "Unique order identifier (PK)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer identifier."
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed."
        tests:
          - not_null
      - name: amount
        description: "Order amount in euros."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: status
        description: "Order status."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: country
        description: "Country of the customer."
        tests:
          - not_null
      - name: _cdc_action
        description: "CDC operation applied: INITIAL_LOAD, INSERT, UPDATE or DELETE."
        tests:
          - not_null
          - accepted_values:
              values: ['INITIAL_LOAD', 'INSERT', 'UPDATE', 'DELETE']
      - name: _loaded_at
        description: "Timestamp when the row was last processed by the CDC pipeline."
        tests:
          - not_null
