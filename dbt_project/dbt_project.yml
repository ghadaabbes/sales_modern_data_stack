name: sales_modern_data_stack
version: "1.0"
config-version: 2

profile: sales_modern_data_stack

model-paths:    ["models"]
macro-paths:    ["macros"]
test-paths:     ["tests"]
docs-paths:     ["docs"]
snapshot-paths: ["snapshots"]

on-run-start:
  - "{{ log('Starting dbt run — ' ~ run_started_at, info=true) }}"

models:
  sales_modern_data_stack:
    staging:
      +schema: STAGING
      +materialized: view
      +tags: ["staging"]
      +meta:
        layer: staging
    intermediate:
      +schema: STAGING
      +materialized: view
      +tags: ["intermediate"]
      +meta:
        layer: intermediate
    marts:
      +schema: MARTS
      +tags: ["marts"]
      +meta:
        layer: marts
      # Each mart model declares its own materialization:
      # fact_sales      → incremental (unique_key: order_id)
      # agg_customers   → incremental (unique_key: customer_id)
      # sales_daily_kpi → incremental (unique_key: order_date + country)
